# kong.yml — Declarative Kong configuration (DB-less mode)
#
# This file is GENERATED, not hand-edited:
#   - services[].routes[].paths            <- scripts/generate-kong-routes.sh  (from the app's live /v3/api-docs)
#   - consumers[] and the key-auth plugin  <- scripts/generate-kong-auth.sh    (from service.config.yaml `auth`)
#
# UAT note: a single static consumer with a deliberately NON-SECRET key
# (see service.config.yaml `auth.api_key`) is used for the pilot, and rate
# limiting is intentionally disabled. Pre-prod replaces this with proper
# IAM/RBAC.

_format_version: "3.0"
services:
  - name: catalogue-service
    url: http://catalogue-service.app.svc.cluster.local:8080
    routes:
      - name: catalogue-all
        paths:
          - /cropcategory
          - /croptype
          - /cropvariety
          - /extensionequipment
          - /fertilizer
          - /insecticide
          - /livestock
          - /location
          - /pesticide
          - /season
          - /seed
          - /soil
        strip_path: false
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
consumers:
  - username: oas-uat-consumer
    keyauth_credentials:
      - key: testapi-123
